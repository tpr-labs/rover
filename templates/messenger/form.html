{% extends "shared/base.html" %}
{% block title %}Send Message · Messenger · Rover{% endblock %}
{% block content %}
<div class="d-flex justify-content-between align-items-center mb-3">
  <h1 class="h4 mb-0 text-white">Send Telegram Message</h1>
  <a class="btn btn-secondary" href="{{ url_for('messenger.messenger_list') }}"><i class="fa-solid fa-arrow-left me-1"></i>Back</a>
</div>

{% if error_message %}
<div class="alert alert-danger">{{ error_message }}</div>
{% endif %}

<div class="card shadow-sm">
  <div class="card-body">
    <form method="post">
      <input type="hidden" name="csrf_token" value="{{ csrf_token }}" />

      <div class="mb-3">
        <label class="form-label">Message Text</label>
        <textarea class="form-control" name="message_text" rows="8" maxlength="4096" required placeholder="Type message to send to Telegram">{{ item.message_text if item else '' }}</textarea>
      </div>

      <button class="btn btn-primary" type="submit"><i class="fa-solid fa-paper-plane me-1"></i>Send</button>
    </form>
  </div>
</div>
{% endblock %}
