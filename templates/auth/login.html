{% extends "shared/base.html" %}
{% block title %}Login · Rover{% endblock %}
{% block content %}
<div class="row justify-content-center">
  <div class="col-12 col-md-7 col-lg-5">
    <div class="card shadow-sm">
      <div class="card-body p-4">
        <h1 class="h5 mb-2">Sign in</h1>
        <p class="text-muted mb-3">Enter your access token to continue.</p>
        {% if error_message %}
        <div class="alert alert-danger py-2" role="alert">{{ error_message }}</div>
        {% endif %}
        <form method="post" autocomplete="off">
          <input type="hidden" name="csrf_token" value="{{ csrf_token }}" />
          <input type="hidden" name="next" value="{{ next_url }}" />
          <div class="mb-3">
            <label class="form-label">Token</label>
            <input class="form-control" type="password" name="token" required autofocus />
          </div>
          <button class="btn btn-outline-secondary w-100" type="submit">Continue</button>
        </form>
      </div>
    </div>
  </div>
</div>
{% endblock %}
