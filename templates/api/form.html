{% extends "shared/base.html" %}
{% block title %}Create API Key · Rover{% endblock %}
{% block content %}
<div class="d-flex justify-content-between align-items-center mb-3">
  <h1 class="h4 mb-0 text-white">Create API Key</h1>
  <a class="btn btn-secondary" href="{{ url_for('api_project.api_keys_list') }}"><i class="fa-solid fa-arrow-left me-1"></i>Back</a>
</div>

{% if error_message %}
<div class="alert alert-danger">{{ error_message }}</div>
{% endif %}

<div class="card shadow-sm">
  <div class="card-body">
    <form method="post">
      <input type="hidden" name="csrf_token" value="{{ csrf_token }}" />

      <div class="mb-3">
        <label class="form-label">Name</label>
        <input class="form-control" name="name" maxlength="120" required placeholder="Example: Integration - Mobile App" value="{{ item.name if item else '' }}" />
      </div>

      <div class="mb-3">
        <label class="form-label">Notes</label>
        <textarea class="form-control" name="notes" rows="5" maxlength="4000" placeholder="Optional metadata for this key">{{ item.notes if item else '' }}</textarea>
      </div>

      <button class="btn btn-primary" type="submit"><i class="fa-solid fa-key me-1"></i>Create Key</button>
    </form>
  </div>
</div>
{% endblock %}
