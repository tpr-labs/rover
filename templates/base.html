<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>{% block title %}Rover{% endblock %}</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
  <style>
    body { background: #f8fafc; }
    .page-wrap { max-width: 1100px; }
  </style>
</head>
<body>
  <nav class="navbar navbar-expand-lg bg-white border-bottom shadow-sm">
    <div class="container page-wrap">
      <span class="navbar-brand fw-semibold">Rover</span>
      {% if is_authenticated %}
      <div class="d-flex align-items-center gap-2">
        <a class="btn btn-sm btn-outline-primary" href="{{ url_for('cities') }}">Cities</a>
        <a class="btn btn-sm btn-outline-primary" href="{{ url_for('sql_page') }}">SQL Explorer</a>
        <a class="btn btn-sm btn-outline-primary" href="{{ url_for('kv_list') }}">Key-Value</a>
      </div>
      {% endif %}
      {% if is_authenticated %}
      <form method="post" action="{{ url_for('logout') }}" class="m-0">
        <input type="hidden" name="csrf_token" value="{{ csrf_token }}" />
        <button type="submit" class="btn btn-outline-secondary btn-sm">Logout</button>
      </form>
      {% endif %}
    </div>
  </nav>

  <main class="container py-4 page-wrap">
    {% block content %}{% endblock %}
  </main>
</body>
</html>
