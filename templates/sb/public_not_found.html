<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Shared Note Not Found</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
  <style>
    body { background: #111318; color: #e9ecef; min-height: 100vh; display: grid; place-items: center; }
    .card { max-width: 520px; background: #1b2028; border: 1px solid #313846; }
    .muted { color: #9ca3af; }
  </style>
</head>
<body>
  <div class="card shadow-sm">
    <div class="card-body p-4 text-center">
      <h1 class="h5 mb-2">This shared note is unavailable</h1>
      <p class="muted mb-0">The link may be invalid, expired, or the file was made private.</p>
    </div>
  </div>
</body>
</html>
