{% extends "shared/base.html" %}
{% block title %}Secondary Brain Graph · Rover{% endblock %}
{% block content %}
<div class="d-flex justify-content-between align-items-center mb-3">
  <h1 class="h4 mb-0"><i class="fa-solid fa-diagram-project me-2"></i>Secondary Brain Graph</h1>
  <div class="d-flex gap-2">
    <a class="btn btn-secondary btn-sm" href="{{ url_for('sb.sb_home') }}"><i class="fa-solid fa-folder-tree me-1"></i>File Explorer</a>
  </div>
</div>

<style>
  .sb-node-details {
    max-height: calc(80vh - 72px);
    min-height: 260px;
    overflow: auto;
    font-size: 0.92rem;
    line-height: 1.45;
  }

  .sb-node-details .detail-name {
    font-size: 1rem;
    line-height: 1.35;
    margin-bottom: .55rem;
    word-break: break-word;
  }

  .sb-node-details .detail-row {
    margin-bottom: .35rem;
    color: #9ca3af;
    word-break: break-word;
  }

  .sb-node-details .detail-tags {
    margin: .55rem 0 .8rem;
    word-break: break-word;
  }

  .sb-node-details .detail-visibility {
    margin-bottom: .55rem;
  }

  .sb-node-details .detail-meta {
    display: grid;
    grid-template-columns: 88px 1fr;
    gap: .25rem .6rem;
    margin: .55rem 0 .8rem;
    font-size: .86rem;
  }

  .sb-node-details .detail-meta .label {
    color: #94a3b8;
  }

  .sb-node-details .detail-meta .value {
    color: #e5e7eb;
    word-break: break-word;
  }

  .sb-node-details .tag-list {
    display: flex;
    flex-wrap: wrap;
    gap: .35rem;
  }

  .sb-node-details .tag-chip {
    display: inline-block;
    padding: .15rem .45rem;
    border-radius: 999px;
    border: 1px solid #475569;
    background: rgba(71, 85, 105, .28);
    color: #dbeafe;
    font-size: .74rem;
    line-height: 1.2;
  }
</style>

<div class="row g-3">
  <div class="col-lg-9">
    <div class="card shadow-sm">
      <div class="card-header d-flex justify-content-between align-items-center">
        <span class="fw-semibold">Graph</span>
        <button
          id="graphToggleBtn"
          class="btn btn-secondary btn-sm"
          type="button"
          data-bs-toggle="collapse"
          data-bs-target="#graphPanel"
          aria-expanded="true"
          aria-controls="graphPanel"
        >
          <i class="fa-solid fa-minus me-1"></i><span>Minimize Graph</span>
        </button>
      </div>
      <div id="graphPanel" class="collapse show">
        <div class="card-body p-0" style="height: 80vh; min-height: 680px;">
          <svg id="graphSvg" width="100%" height="100%"></svg>
        </div>
      </div>
    </div>
  </div>
  <div class="col-lg-3">
    <div class="card shadow-sm h-100">
      <div class="card-header fw-semibold">Node Details</div>
      <div class="card-body sb-node-details" id="nodeDetails">
        <p class="text-muted mb-0">Click a node to see details.</p>
      </div>
    </div>
  </div>
</div>

<script src="https://cdn.jsdelivr.net/npm/d3@7"></script>
<script>
(() => {
  const svg = d3.select('#graphSvg');
  const details = document.getElementById('nodeDetails');
  const graphPanel = document.getElementById('graphPanel');
  const graphToggleBtn = document.getElementById('graphToggleBtn');
  const graphDataUrl = '{{ url_for("sb.sb_graph_data") }}';
  const sbHomeUrl = '{{ url_for("sb.sb_home") }}';

  let zoom;
  let simulation;
  let container;
  let linkSel;
  let nodeSel;
  let nodes = [];
  let links = [];
  let adjacency = new Map();

  function nodeRadius(d) {
    if (d.kind === 'root_hub') return 14;
    return d.kind === 'folder' ? 10 : 6;
  }
  function labelText(d) {
    const s = d.name || '';
    return s.length > 30 ? `${s.slice(0, 27)}...` : s;
  }

  function linkColor(kind) {
    if (kind === 'explicit_link') return '#ef4444';
    if (kind === 'folder_tree') return '#34d399';
    if (kind === 'root_hub_link') return '#a78bfa';
    if (kind === 'folder_contains') return '#60a5fa';
    return '#94a3b8';
  }
  function linkWidth(kind) {
    if (kind === 'explicit_link') return 2.2;
    if (kind === 'root_hub_link') return 1.8;
    if (kind === 'folder_tree') return 1.4;
    return 1.0;
  }
  function linkOpacity(kind) {
    if (kind === 'explicit_link') return 0.75;
    if (kind === 'root_hub_link') return 0.68;
    if (kind === 'folder_tree') return 0.85;
    if (kind === 'folder_contains') return 0.78;
    return 0.22;
  }

  function linkDistance(kind) {
    if (kind === 'explicit_link') return 100;
    if (kind === 'root_hub_link') return 150;
    if (kind === 'folder_tree') return 130;
    if (kind === 'folder_contains') return 80;
    return 70;
  }

  function linkStrength(kind) {
    if (kind === 'explicit_link') return 0.25;
    if (kind === 'root_hub_link') return 0.22;
    if (kind === 'folder_tree') return 0.12;
    if (kind === 'folder_contains') return 0.18;
    return 0.06;
  }

  function renderDetails(node) {
    if (!node) {
      details.innerHTML = '<p class="text-muted mb-0">Click a node to see details.</p>';
      return;
    }

    const escapeHtml = (s) => String(s ?? '')
      .replaceAll('&', '&amp;')
      .replaceAll('<', '&lt;')
      .replaceAll('>', '&gt;')
      .replaceAll('"', '&quot;')
      .replaceAll("'", '&#39;');

    const fileId = node.kind === 'file' ? (node.id || '').split(':')[1] || '-' : null;
    const folderId = node.folder_id || null;
    const kindBadge = node.kind === 'folder' ? 'rv-badge-pending' : node.kind === 'root_hub' ? 'rv-badge-primary' : 'rv-badge-info';
    const tags = (node.tags || '')
      .split(',')
      .map(t => t.trim())
      .filter(Boolean);
    const folderOpenUrl = folderId ? `${sbHomeUrl}?folder_id=${encodeURIComponent(folderId)}` : null;

    const tagsHtml = tags.length
      ? `<div class="tag-list">${tags.map(t => `<span class="tag-chip">${escapeHtml(t)}</span>`).join('')}</div>`
      : '<span class="text-muted">-</span>';

    details.innerHTML = `
      <div class="mb-2 d-flex flex-wrap align-items-center gap-2">
        <span class="badge rv-badge ${kindBadge}">${escapeHtml(node.kind)}</span>
        ${node.kind === 'file' ? `<span class="badge rv-badge ${node.is_public === 'Y' ? 'rv-badge-active' : 'rv-badge-neutral'}">${node.is_public === 'Y' ? 'Public' : 'Private'}</span>` : ''}
      </div>
      <h6 class="detail-name">${escapeHtml(node.name || '-')}</h6>

      <div class="detail-meta">
        ${node.kind === 'file' ? `<div class="label">File ID</div><div class="value">${escapeHtml(fileId)}</div>` : ''}
        ${folderId ? `<div class="label">Folder ID</div><div class="value">${escapeHtml(folderId)}</div>` : ''}
        <div class="label">Created</div><div class="value">${escapeHtml(node.created_at_human || '-')}</div>
        <div class="label">Updated</div><div class="value">${escapeHtml(node.updated_at_human || '-')}</div>
      </div>

      ${node.kind === 'file' ? `<div class="detail-tags"><strong>Tags</strong><div class="mt-2">${tagsHtml}</div></div>` : ''}

      <div class="d-flex flex-wrap gap-2 mt-2">
        ${node.go_to_url ? `<a class="btn btn-sm btn-secondary" href="${node.go_to_url}"><i class="fa-solid fa-arrow-up-right-from-square me-1"></i>Open</a>` : ''}
        ${node.kind === 'file' && folderOpenUrl ? `<a class="btn btn-sm btn-secondary" href="${folderOpenUrl}"><i class="fa-regular fa-folder-open me-1"></i>Open Folder</a>` : ''}
      </div>
    `;
  }

  function fitGraph(animate = true) {
    if (!nodes.length || !zoom) return;
    const width = svg.node().getBoundingClientRect().width;
    const height = svg.node().getBoundingClientRect().height;

    const minX = d3.min(nodes, d => d.x - nodeRadius(d) - 40) ?? 0;
    const maxX = d3.max(nodes, d => d.x + nodeRadius(d) + 180) ?? width;
    const minY = d3.min(nodes, d => d.y - nodeRadius(d) - 40) ?? 0;
    const maxY = d3.max(nodes, d => d.y + nodeRadius(d) + 40) ?? height;

    const graphW = Math.max(1, maxX - minX);
    const graphH = Math.max(1, maxY - minY);
    const scale = Math.min(width / (graphW + 100), height / (graphH + 100), 1.6);
    const tx = (width - graphW * scale) / 2 - minX * scale;
    const ty = (height - graphH * scale) / 2 - minY * scale;
    const t = d3.zoomIdentity.translate(tx, ty).scale(scale);

    if (animate) svg.transition().duration(260).call(zoom.transform, t);
    else svg.call(zoom.transform, t);
  }

  function initializeLayout(allNodes) {
    const width = svg.node().getBoundingClientRect().width;
    const height = svg.node().getBoundingClientRect().height;

    allNodes.forEach((n, i) => {
      const angle = (2 * Math.PI * i) / Math.max(1, allNodes.length);
      const radius = Math.min(width, height) * 0.28 + (n.kind === 'folder' ? 20 : 0);
      n.x = width / 2 + radius * Math.cos(angle) + (Math.random() - 0.5) * 16;
      n.y = height / 2 + radius * Math.sin(angle) + (Math.random() - 0.5) * 16;
    });
  }

  function buildAdjacency() {
    adjacency = new Map(nodes.map(n => [n.id, new Set()]));
    for (const l of links) {
      adjacency.get(l.source.id)?.add(l.target);
      adjacency.get(l.target.id)?.add(l.source);
    }
  }

  function updatePositions() {
    linkSel
      .attr('x1', d => d.source.x)
      .attr('y1', d => d.source.y)
      .attr('x2', d => d.target.x)
      .attr('y2', d => d.target.y);

    nodeSel.attr('transform', d => `translate(${d.x},${d.y})`);
  }

  function applyFocus(node) {
    if (!node) {
      nodeSel.style('opacity', 1);
      linkSel.style('opacity', d => linkOpacity(d.kind));
      return;
    }

    const neighbors = adjacency.get(node.id) || new Set();
    nodeSel.style('opacity', d => (d.id === node.id || neighbors.has(d)) ? 1 : 0.2);
    linkSel.style('opacity', d => (d.source.id === node.id || d.target.id === node.id) ? 0.9 : 0.08);
  }

  function setGraphToggleState(expanded) {
    if (!graphToggleBtn) return;
    const icon = graphToggleBtn.querySelector('i');
    const label = graphToggleBtn.querySelector('span');
    if (expanded) {
      if (icon) icon.className = 'fa-solid fa-minus me-1';
      if (label) label.textContent = 'Minimize Graph';
      graphToggleBtn.setAttribute('aria-expanded', 'true');
    } else {
      if (icon) icon.className = 'fa-solid fa-plus me-1';
      if (label) label.textContent = 'Expand Graph';
      graphToggleBtn.setAttribute('aria-expanded', 'false');
    }
  }

  async function draw() {
    const res = await fetch(graphDataUrl);
    const data = await res.json();

    nodes = (data.nodes || []).map(n => ({ ...n }));
    const nodeById = new Map(nodes.map(n => [n.id, n]));
    links = (data.links || [])
      .map(l => ({ ...l, source: nodeById.get(l.source), target: nodeById.get(l.target) }))
      .filter(l => l.source && l.target);

    svg.selectAll('*').remove();
    container = svg.append('g');

    zoom = d3.zoom().scaleExtent([0.12, 6]).on('zoom', (event) => {
      container.attr('transform', event.transform);
    });
    svg.call(zoom);

    initializeLayout(nodes);
    buildAdjacency();

    linkSel = container.append('g')
      .attr('fill', 'none')
      .selectAll('line')
      .data(links)
      .enter()
      .append('line')
      .attr('stroke', d => linkColor(d.kind))
      .attr('stroke-width', d => linkWidth(d.kind))
      .attr('stroke-dasharray', d => (d.kind === 'folder_tree' || d.kind === 'root_hub_link') ? '5,3' : null)
      .attr('stroke-opacity', d => linkOpacity(d.kind));

    nodeSel = container.append('g')
      .selectAll('g')
      .data(nodes)
      .enter()
      .append('g')
      .style('cursor', 'pointer')
      .on('click', (_, d) => {
        renderDetails(d);
        applyFocus(d);
      })
      .on('mouseenter', (_, d) => applyFocus(d))
      .on('mouseleave', () => applyFocus(null));

    nodeSel.append('circle')
      .attr('r', d => nodeRadius(d) + 9)
      .attr('fill', 'transparent');

    nodeSel.append('circle')
      .attr('r', d => nodeRadius(d))
      .attr('fill', d => d.kind === 'root_hub' ? '#8b5cf6' : d.kind === 'folder' ? '#f59e0b' : '#3b82f6')
      .attr('stroke', d => {
        if (d.kind === 'root_hub') return '#f5f3ff';
        if (d.kind === 'file' && d.is_public === 'Y') return '#22c55e';
        return '#1f2937';
      })
      .attr('stroke-width', d => {
        if (d.kind === 'root_hub') return 2.1;
        if (d.kind === 'file' && d.is_public === 'Y') return 2.3;
        return 1.3;
      });

    nodeSel.append('text')
      .text(d => labelText(d))
      .attr('x', d => nodeRadius(d) + 7)
      .attr('y', 4)
      .attr('font-size', 11)
      .attr('fill', '#e5e7eb')
      .style('pointer-events', 'none');

    nodeSel.call(d3.drag()
      .on('start', function(event, d) {
        if (event.sourceEvent) event.sourceEvent.stopPropagation();
        d3.select(this).raise();
        if (!event.active) simulation.alphaTarget(0.18).restart();
        d.fx = d.x;
        d.fy = d.y;
      })
      .on('drag', (event, d) => {
        d.fx = event.x;
        d.fy = event.y;
      })
      .on('end', (event, d) => {
        if (!event.active) simulation.alphaTarget(0);
        d.fx = null;
        d.fy = null;
      })
    );

    simulation = d3.forceSimulation(nodes)
      .force('link', d3.forceLink(links).id(d => d.id).distance(d => linkDistance(d.kind)).strength(d => linkStrength(d.kind)))
      .force('charge', d3.forceManyBody().strength(d => d.kind === 'folder' ? -280 : -170))
      .force('center', d3.forceCenter(svg.node().getBoundingClientRect().width / 2, svg.node().getBoundingClientRect().height / 2))
      .force('collide', d3.forceCollide().radius(d => nodeRadius(d) + Math.min((d.name || '').length * 0.6, 24) + 8).iterations(2))
      .alpha(0.9)
      .alphaDecay(0.04)
      .velocityDecay(0.34)
      .on('tick', updatePositions)
      .on('end', () => fitGraph(true));

    updatePositions();
    fitGraph(false);
    setTimeout(() => fitGraph(true), 600);
    applyFocus(null);
    renderDetails(null);

    if (graphPanel) {
      setGraphToggleState(graphPanel.classList.contains('show'));
      graphPanel.addEventListener('shown.bs.collapse', () => {
        setGraphToggleState(true);
        setTimeout(() => fitGraph(true), 80);
      });
      graphPanel.addEventListener('hidden.bs.collapse', () => setGraphToggleState(false));
    }
  }

  draw();
})();
</script>
{% endblock %}
