<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>{{ file.title }} · Shared Note</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
  <style>
    body { background: #111318; color: #e9ecef; }
    .wrap { max-width: 820px; margin: 0 auto; padding: 2rem 1rem; }
    .meta { color: #9ca3af; font-size: .9rem; }
    .content { line-height: 1.7; }
    .content pre { background: #0c1016; border: 1px solid #2e3642; padding: .8rem; border-radius: 8px; }
    .content code { color: #fca5a5; }
    .content a { color: #93c5fd; }
  </style>
</head>
<body>
  <main class="wrap">
    <h1 class="h3 mb-2">{{ file.title }}</h1>
    <div class="meta mb-4">Updated: {{ file.updated_at }}</div>
    <article class="content">{{ html_content|safe }}</article>
  </main>
</body>
</html>
