<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>{% block title %}Rover{% endblock %}</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/@fortawesome/fontawesome-free@6.5.2/css/all.min.css" />
  <style>
    :root {
      --rv-bg: #121417;
      --rv-surface: #1c1f24;
      --rv-border: #353b45;
      --rv-text: #e9ecef;
      --rv-muted: #adb5bd;
    }

    body {
      background: var(--rv-bg);
      color: var(--rv-text);
      min-height: 100vh;
    }

    .page-wrap { max-width: 1180px; }

    .rv-navbar {
      background: #1a1d22 !important;
      border-bottom: 1px solid var(--rv-border);
    }

    .rv-brand-dot {
      display: inline-block;
      width: 8px;
      height: 8px;
      border-radius: 999px;
      background: #0d6efd;
      margin-right: 0.5rem;
      transform: translateY(-1px);
    }

    .rv-nav-link {
      color: var(--rv-muted) !important;
      border: 1px solid transparent;
      border-radius: 10px;
      padding: 0.45rem 0.7rem !important;
      font-size: 0.9rem;
      transition: all .18s ease;
    }
    .rv-nav-link:hover,
    .rv-nav-link:focus {
      color: var(--rv-text) !important;
      background: rgba(255,255,255,0.06);
      border-color: var(--rv-border);
    }

    .rv-card,
    .card {
      background: var(--rv-surface);
      border: 1px solid var(--rv-border) !important;
      border-radius: 12px !important;
      color: var(--rv-text);
    }

    .card-header {
      background: #20242b !important;
      border-bottom: 1px solid var(--rv-border) !important;
      color: var(--rv-text);
    }

    .bg-white {
      background: #20242b !important;
      color: var(--rv-text) !important;
    }

    .list-group-item {
      background: #1a1e24;
      border-color: var(--rv-border);
      color: var(--rv-text);
    }

    .list-group-item-action:hover,
    .list-group-item-action:focus {
      background: #232833;
      color: var(--rv-text);
    }

    .breadcrumb {
      --bs-breadcrumb-divider-color: #8b95a5;
    }

    .breadcrumb-item,
    .breadcrumb-item + .breadcrumb-item::before {
      color: #9aa4b2;
    }

    .breadcrumb-item a {
      color: #9ec3ff;
      text-decoration: none;
    }

    .breadcrumb-item a:hover {
      color: #c5ddff;
      text-decoration: underline;
    }

    .breadcrumb-item.active,
    .breadcrumb-item.active[aria-current="page"] {
      color: #e9ecef !important;
      font-weight: 600;
    }

    .text-muted { color: var(--rv-muted) !important; }

    .text-dark,
    .text-body,
    .text-body-secondary {
      color: var(--rv-text) !important;
    }

    a {
      color: #8ab4ff;
    }
    a:hover {
      color: #b5d0ff;
    }

    .btn-secondary {
      color: #f3f4f6;
      background: #4b5563;
      border-color: #4b5563;
    }
    .btn-secondary:hover {
      color: #fff;
      background: #5b6472;
      border-color: #5b6472;
    }
    .btn-check:focus + .btn-secondary,
    .btn-secondary:focus {
      color: #fff;
      background: #5b6472;
      border-color: #6b7280;
      box-shadow: 0 0 0 .2rem rgba(148, 163, 184, .35);
    }
    .btn-check:checked + .btn-secondary,
    .btn-check:active + .btn-secondary,
    .btn-secondary:active,
    .btn-secondary.active,
    .show > .btn-secondary.dropdown-toggle {
      color: #fff;
      background: #3f4753;
      border-color: #3f4753;
    }
    .btn-secondary:disabled,
    .btn-secondary.disabled {
      color: #cfd4dc;
      background: #39414d;
      border-color: #39414d;
      opacity: 1;
    }

    .rv-badge {
      font-weight: 600;
      border: 1px solid transparent;
      letter-spacing: .01em;
    }
    .rv-badge-neutral {
      color: #d7dbe3;
      background: rgba(130, 140, 156, .22);
      border-color: rgba(130, 140, 156, .45);
    }
    .rv-badge-active {
      color: #d9fbe7;
      background: rgba(34, 197, 94, .18);
      border-color: rgba(52, 211, 153, .45);
    }
    .rv-badge-danger {
      color: #ffe0e0;
      background: rgba(239, 68, 68, .18);
      border-color: rgba(248, 113, 113, .45);
    }
    .rv-badge-pending {
      color: #fff2d6;
      background: rgba(245, 158, 11, .22);
      border-color: rgba(251, 191, 36, .45);
    }
    .rv-badge-info {
      color: #d8ebff;
      background: rgba(59, 130, 246, .2);
      border-color: rgba(96, 165, 250, .45);
    }
    .rv-badge-dark {
      color: #e5e7eb;
      background: rgba(31, 41, 55, .8);
      border-color: rgba(75, 85, 99, .65);
    }
    .rv-badge-primary {
      color: #e0e7ff;
      background: rgba(99, 102, 241, .22);
      border-color: rgba(129, 140, 248, .45);
    }

    .dropdown-menu {
      background: #1a1e24;
      border-color: #3b414b;
    }
    .dropdown-item {
      color: var(--rv-text);
    }
    .dropdown-item:hover,
    .dropdown-item:focus {
      color: #fff;
      background: #2a3140;
    }
    .dropdown-divider {
      border-top-color: #3b414b;
    }

    .navbar-toggler:focus {
      box-shadow: 0 0 0 .2rem rgba(13,110,253,.25);
    }

    .form-control,
    .form-select {
      background: #171a1f;
      border-color: #3b414b;
      color: var(--rv-text);
    }
    .form-control:focus,
    .form-select:focus {
      background: #171a1f;
      color: var(--rv-text);
      border-color: #6ea8fe;
      box-shadow: 0 0 0 .2rem rgba(13, 110, 253, .2);
    }

    .form-control::placeholder,
    textarea.form-control::placeholder {
      color: #9aa3af;
      opacity: 1;
    }

    .form-select option {
      background: #171a1f;
      color: var(--rv-text);
    }

    .table { --bs-table-color: var(--rv-text); --bs-table-bg: transparent; }
    .table-dark { --bs-table-bg: #1a1d22; --bs-table-border-color: #353b45; }
    .table-striped > tbody > tr:nth-of-type(odd) > * { --bs-table-bg-type: rgba(255,255,255,0.02); }
    .table > :not(caption) > * > * {
      color: var(--rv-text) !important;
      border-color: #3a414d;
    }
    .table td,
    .table th {
      vertical-align: middle;
    }
    .table a {
      color: #9ec3ff;
    }
    .table a:hover {
      color: #c5ddff;
    }

    .alert-info {
      color: #cce3ff;
      background: rgba(59,130,246,.16);
      border-color: rgba(79,157,255,.38);
    }

    @media (max-width: 991.98px) {
      .page-wrap { max-width: 100%; }
      .rv-mobile-stack .btn { width: 100%; }
      .rv-mobile-stack .dropdown {
        width: 100%;
      }
      .rv-mobile-stack .dropdown > .btn {
        width: 100%;
      }
      .rv-mobile-stack .dropdown-menu {
        position: static;
        transform: none !important;
        width: 100%;
        margin-top: .35rem;
      }
    }
  </style>
</head>
<body>
  <nav class="navbar navbar-expand-lg rv-navbar shadow-sm sticky-top">
    <div class="container page-wrap">
      <a class="navbar-brand fw-semibold text-light" href="{{ url_for('core.dashboard') if is_authenticated else '#' }}">
        <span class="rv-brand-dot"></span>Rover
      </a>

      <button class="navbar-toggler border-0" type="button" data-bs-toggle="collapse" data-bs-target="#rvNav" aria-controls="rvNav" aria-expanded="false" aria-label="Toggle navigation">
        <i class="fa-solid fa-bars text-light"></i>
      </button>

      <div class="collapse navbar-collapse" id="rvNav">
      {% if is_authenticated %}
      <div class="ms-auto d-flex align-items-center gap-2 mt-3 mt-lg-0 rv-mobile-stack">
        <div class="dropdown">
          <button class="btn btn-secondary btn-sm dropdown-toggle" type="button" data-bs-toggle="dropdown" aria-expanded="false">
            <i class="fa-solid fa-link me-1"></i>Shortcuts
          </button>
          <ul class="dropdown-menu dropdown-menu-end">
            {% for sc in nav_shortcuts %}
            <li><a class="dropdown-item" href="{{ sc.path }}">{{ sc.title }}</a></li>
            {% else %}
            <li><span class="dropdown-item-text text-muted">No active shortcuts</span></li>
            {% endfor %}
            <li><hr class="dropdown-divider"></li>
            <li><a class="dropdown-item" href="{{ url_for('shortcuts.shortcuts_list') }}"><i class="fa-solid fa-gear me-1"></i>Manage shortcuts</a></li>
          </ul>
        </div>
        <form method="post" action="{{ url_for('auth.logout') }}" class="m-0">
          <input type="hidden" name="csrf_token" value="{{ csrf_token }}" />
          <button type="submit" class="btn btn-secondary btn-sm"><i class="fa-solid fa-right-from-bracket me-1"></i>Logout</button>
        </form>
      </div>
      {% endif %}
      </div>
    </div>
  </nav>

  <main class="container py-4 page-wrap">
    {% block content %}{% endblock %}
  </main>

  <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
