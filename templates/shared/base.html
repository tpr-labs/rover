<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>{% block title %}Rover{% endblock %}</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/@fortawesome/fontawesome-free@6.5.2/css/all.min.css" />
  <style>
    :root {
      --rv-bg: #121417;
      --rv-surface: #1c1f24;
      --rv-border: #353b45;
      --rv-text: #e9ecef;
      --rv-muted: #adb5bd;
    }

    body {
      background: var(--rv-bg);
      color: var(--rv-text);
      min-height: 100vh;
    }

    .page-wrap { max-width: 1180px; }

    .rv-navbar {
      background: #1a1d22 !important;
      border-bottom: 1px solid var(--rv-border);
    }

    .rv-brand-dot {
      display: inline-block;
      width: 8px;
      height: 8px;
      border-radius: 999px;
      background: #0d6efd;
      margin-right: 0.5rem;
      transform: translateY(-1px);
    }

    .rv-nav-link {
      color: var(--rv-muted) !important;
      border: 1px solid transparent;
      border-radius: 10px;
      padding: 0.45rem 0.7rem !important;
      font-size: 0.9rem;
      transition: all .18s ease;
    }
    .rv-nav-link:hover,
    .rv-nav-link:focus {
      color: var(--rv-text) !important;
      background: rgba(255,255,255,0.06);
      border-color: var(--rv-border);
    }

    .rv-card,
    .card {
      background: var(--rv-surface);
      border: 1px solid var(--rv-border) !important;
      border-radius: 12px !important;
      color: var(--rv-text);
    }

    .card-header {
      background: #20242b !important;
      border-bottom: 1px solid var(--rv-border) !important;
      color: var(--rv-text);
    }

    .bg-white {
      background: #20242b !important;
      color: var(--rv-text) !important;
    }

    .list-group-item {
      background: #1a1e24;
      border-color: var(--rv-border);
      color: var(--rv-text);
    }

    .list-group-item-action:hover,
    .list-group-item-action:focus {
      background: #232833;
      color: var(--rv-text);
    }

    .breadcrumb {
      --bs-breadcrumb-divider-color: #8b95a5;
    }

    .breadcrumb-item,
    .breadcrumb-item + .breadcrumb-item::before {
      color: #9aa4b2;
    }

    .breadcrumb-item a {
      color: #9ec3ff;
      text-decoration: none;
    }

    .breadcrumb-item a:hover {
      color: #c5ddff;
      text-decoration: underline;
    }

    .breadcrumb-item.active,
    .breadcrumb-item.active[aria-current="page"] {
      color: #e9ecef !important;
      font-weight: 600;
    }

    .text-muted { color: var(--rv-muted) !important; }

    .text-dark,
    .text-body,
    .text-body-secondary {
      color: var(--rv-text) !important;
    }

    a {
      color: #8ab4ff;
    }
    a:hover {
      color: #b5d0ff;
    }

    .btn-outline-secondary {
      color: #d1d5db;
      border-color: #4b5563;
    }
    .btn-outline-secondary:hover {
      color: #fff;
      background: rgba(255,255,255,0.10);
      border-color: #6b7280;
    }

    .navbar-toggler:focus {
      box-shadow: 0 0 0 .2rem rgba(13,110,253,.25);
    }

    .form-control,
    .form-select {
      background: #171a1f;
      border-color: #3b414b;
      color: var(--rv-text);
    }
    .form-control:focus,
    .form-select:focus {
      background: #171a1f;
      color: var(--rv-text);
      border-color: #6ea8fe;
      box-shadow: 0 0 0 .2rem rgba(13, 110, 253, .2);
    }

    .form-control::placeholder,
    textarea.form-control::placeholder {
      color: #9aa3af;
      opacity: 1;
    }

    .form-select option {
      background: #171a1f;
      color: var(--rv-text);
    }

    .table { --bs-table-color: var(--rv-text); --bs-table-bg: transparent; }
    .table-dark { --bs-table-bg: #1a1d22; --bs-table-border-color: #353b45; }
    .table-striped > tbody > tr:nth-of-type(odd) > * { --bs-table-bg-type: rgba(255,255,255,0.02); }
    .table > :not(caption) > * > * {
      color: var(--rv-text) !important;
      border-color: #3a414d;
    }
    .table td,
    .table th {
      vertical-align: middle;
    }
    .table a {
      color: #9ec3ff;
    }
    .table a:hover {
      color: #c5ddff;
    }

    .alert-info {
      color: #cce3ff;
      background: rgba(59,130,246,.16);
      border-color: rgba(79,157,255,.38);
    }

    @media (max-width: 991.98px) {
      .page-wrap { max-width: 100%; }
      .rv-mobile-stack .btn { width: 100%; }
    }
  </style>
</head>
<body>
  <nav class="navbar navbar-expand-lg rv-navbar shadow-sm sticky-top">
    <div class="container page-wrap">
      <a class="navbar-brand fw-semibold text-light" href="{{ url_for('core.dashboard') if is_authenticated else '#' }}">
        <span class="rv-brand-dot"></span>Rover
      </a>

      <button class="navbar-toggler border-0" type="button" data-bs-toggle="collapse" data-bs-target="#rvNav" aria-controls="rvNav" aria-expanded="false" aria-label="Toggle navigation">
        <i class="fa-solid fa-bars text-light"></i>
      </button>

      <div class="collapse navbar-collapse" id="rvNav">
      {% if is_authenticated %}
      <div class="ms-auto d-flex align-items-center gap-2 mt-3 mt-lg-0 rv-mobile-stack">
        <form method="post" action="{{ url_for('auth.logout') }}" class="m-0">
          <input type="hidden" name="csrf_token" value="{{ csrf_token }}" />
          <button type="submit" class="btn btn-outline-secondary btn-sm"><i class="fa-solid fa-right-from-bracket me-1"></i>Logout</button>
        </form>
      </div>
      {% endif %}
      </div>
    </div>
  </nav>

  <main class="container py-4 page-wrap">
    {% block content %}{% endblock %}
  </main>

  <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
